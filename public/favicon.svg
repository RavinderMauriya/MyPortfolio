<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Vibrant blue to purple gradient for the R -->
    <linearGradient id="rGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Slightly muted gradient for the brackets to make the R pop -->
    <linearGradient id="bracketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>

  <!-- Dark theme background -->
  <rect width="512" height="512" rx="120" fill="#0B0F19"/>
  
  <g fill="none" stroke-width="44" stroke-linecap="round" stroke-linejoin="round">
    <!-- Code Brackets & Slash: < /> -->
    <g stroke="url(#bracketGrad)" opacity="0.8">
      <!-- Left Angle Bracket < -->
      <path d="M 96 180 L 36 256 L 96 332" />
      
      <!-- Right Angle Bracket > -->
      <path d="M 416 180 L 476 256 L 416 332" />
      
      <!-- Forward Slash / -->
      <line x1="324" y1="360" x2="364" y2="152" />
    </g>

    <!-- The Letter "R" -->
    <g stroke="url(#rGrad)">
      <!-- Vertical Stem -->
      <line x1="156" y1="160" x2="156" y2="352" />
      <!-- Top Loop (perfect semi-circle) -->
      <path d="M 156 160 L 216 160 A 48 48 0 0 1 216 256 L 156 256" />
      <!-- Diagonal Leg -->
      <line x1="186" y1="256" x2="246" y2="352" />
    </g>
  </g>
</svg>